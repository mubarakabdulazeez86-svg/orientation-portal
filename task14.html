<!DOCTYPE html>
<html>
<head>
    <title>Task 14 - Complete Styled Table</title>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid black;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }

    
        tr:nth-child(even) {
            background-color: #D6EEEE;
        }

        
        tr:hover {
            background-color: #a8dadc;
        }

        
        th {
            background-color: #457b9d;
            color: white;
        }
    </style>
</head>

<body>

    <h2>Student Record Table</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Email</th>
            <th>Course</th>
        </tr>

        <tr>
            <td>John Doe</td>
            <td>20</td>
            <td>john@example.com</td>
            <td>Software Engineering</td>
        </tr>

        <tr>
            <td>Mary Smith</td>
            <td>22</td>
            <td>mary@example.com</td>
            <td>Computer Science</td>
        </tr>

        <tr>
            <td>David Johnson</td>
            <td>19</td>
            <td>david@example.com</td>
            <td>Information Technology</td>
        </tr>

        <tr>
            <td>Sarah Lee</td>
            <td>21</td>
            <td>sarah@example.com</td>
            <td>Cyber Security</td>
        </tr>

    </table>

</body>
</html>
