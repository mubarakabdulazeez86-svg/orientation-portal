<!DOCTYPE html>
<html>
<head>
    <title>Veritas University Orientation Portal</title>
</head>
<body>

    <h2>Veritas University Orientation Portal</h2>

    <form>

        <fieldset>
            <legend>Student Orientation Registration Form</legend>

            
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            <br><br>

            <label for="matric">Matriculation Number:</label>
            <input type="text" id="matric" name="matric" placeholder="Enter your matric number" required>
            <br><br>
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            <br><br>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" placeholder="Enter your age" required>
            <br><br>
            <p>Gender:</p>

            <input type="radio" id="male" name="gender" value="Male" required>
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="Female" required>
            <label for="female">Female</label>

            <br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required>
            <br><br>

            <label for="faculty">Faculty:</label>
            <select id="faculty" name="faculty" required>
                <option value="">--Select Faculty--</option>
                <option value="science">Science</option>
                <option value="arts">Arts</option>
                <option value="management">Management Sciences</option>
            </select>

            <br><br>

            <p>Documents Submitted:</p>

            <input type="checkbox" id="admission" name="docs" value="Admission Letter">
            <label for="admission">Admission Letter</label>

            <input type="checkbox" id="receipt" name="docs" value="Payment Receipt">
            <label for="receipt">Payment Receipt</label>

            <input type="checkbox" id="idcard" name="docs" value="School ID Card">
            <label for="idcard">School ID Card</label>

            <br><br>
            <label for="passport">Upload Passport Photograph:</label>
            <input type="file" id="passport" name="passport" required>

            <br><br>
            <label for="message">Additional Comments / Questions:</label>
            <br>
            <textarea id="message" name="message" rows="4" cols="40" placeholder="Enter additional information here..."></textarea>

            <br><br>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">

        </fieldset>

    </form>

</body>
</html>
